<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LUXE — Premium Shopping</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ── RESET & VARIABLES ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0E0E0E;
  --surface: #161616;
  --surface2: #1E1E1E;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --gold: #C9A84C;
  --gold-light: #E4C97E;
  --gold-dim: rgba(201,168,76,0.15);
  --text: #F0EDE8;
  --text2: #9A9390;
  --text3: #5C5856;
  --white: #FFFFFF;
  --red: #E05252;
  --green: #52C97A;
  --sidebar-w: 280px;
  --topbar-h: 64px;
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --shadow-lg: 0 24px 64px rgba(0,0,0,0.6);
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}
#root { display: flex; flex-direction: column; min-height: 100vh; }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

/* ── TOPBAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h);
  background: rgba(14,14,14,0.92); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 16px;
  z-index: 200; transition: box-shadow var(--transition);
}
.topbar.scrolled { box-shadow: 0 4px 40px rgba(0,0,0,0.5); }

.hamburger-btn {
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: var(--radius-sm); width: 42px; height: 42px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 5px; cursor: pointer; flex-shrink: 0;
  transition: all var(--transition);
}
.hamburger-btn:hover { background: var(--gold-dim); border-color: var(--gold); }
.ham-line {
  width: 18px; height: 2px; background: var(--text);
  border-radius: 2px; transition: all var(--transition);
}
.hamburger-btn.open .ham-line:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger-btn.open .ham-line:nth-child(2) { opacity: 0; transform: scaleX(0); }
.hamburger-btn.open .ham-line:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

.logo {
  font-family: 'Playfair Display', serif;
  font-size: 24px; font-weight: 700; letter-spacing: 5px;
  color: var(--white); cursor: pointer; flex-shrink: 0; text-decoration: none;
  background: linear-gradient(135deg, #fff 0%, var(--gold-light) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.search-wrap {
  flex: 1; max-width: 520px; margin: 0 auto;
  position: relative; display: flex; align-items: center;
}
.search-input {
  width: 100%; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 100px; padding: 10px 48px 10px 18px;
  font-family: 'Outfit', sans-serif; font-size: 14px; color: var(--text);
  outline: none; transition: all var(--transition);
}
.search-input::placeholder { color: var(--text3); }
.search-input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim); background: var(--surface); }
.search-icon-btn {
  position: absolute; right: 14px; background: none; border: none;
  cursor: pointer; color: var(--text2); font-size: 16px; padding: 4px;
  transition: color var(--transition);
}
.search-icon-btn:hover { color: var(--gold); }

.topbar-right { display: flex; align-items: center; gap: 10px; margin-left: auto; flex-shrink: 0; }
.icon-btn {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); width: 42px; height: 42px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; transition: all var(--transition);
  position: relative;
}
.icon-btn:hover { border-color: var(--gold); background: var(--gold-dim); }
.badge {
  position: absolute; top: -5px; right: -5px;
  background: var(--gold); color: #000; border-radius: 50%;
  width: 18px; height: 18px; font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  border: 2px solid var(--bg);
}

/* ── SIDEBAR ── */
.sidebar-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px); z-index: 300;
  opacity: 0; pointer-events: none; transition: opacity var(--transition);
}
.sidebar-overlay.open { opacity: 1; pointer-events: all; }

.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0;
  width: var(--sidebar-w); background: var(--surface);
  border-right: 1px solid var(--border2); z-index: 400;
  display: flex; flex-direction: column;
  transform: translateX(-100%); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
  overflow: hidden;
}
.sidebar.open { transform: translateX(0); }

.sidebar-header {
  padding: 20px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.sidebar-logo {
  font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700;
  letter-spacing: 4px;
  background: linear-gradient(135deg, #fff 0%, var(--gold-light) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.sidebar-close {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; width: 32px; height: 32px; cursor: pointer;
  color: var(--text2); font-size: 16px; display: flex;
  align-items: center; justify-content: center; transition: all var(--transition);
}
.sidebar-close:hover { background: var(--red); color: white; border-color: var(--red); }

.sidebar-content { flex: 1; overflow-y: auto; padding: 16px 0; }

.sidebar-section-title {
  font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase;
  color: var(--text3); padding: 16px 24px 8px; font-weight: 600;
}

.sidebar-item {
  display: flex; align-items: center; gap: 14px;
  padding: 13px 24px; cursor: pointer;
  transition: all var(--transition); position: relative;
  border-left: 3px solid transparent;
}
.sidebar-item:hover { background: var(--gold-dim); border-left-color: var(--gold); }
.sidebar-item.active { background: var(--gold-dim); border-left-color: var(--gold); }
.sidebar-item.active .sidebar-item-label { color: var(--gold-light); }
.sidebar-item-icon { font-size: 20px; width: 24px; text-align: center; flex-shrink: 0; }
.sidebar-item-label { font-size: 14px; font-weight: 500; color: var(--text); }
.sidebar-item-count { margin-left: auto; font-size: 11px; color: var(--text3); background: var(--surface2); padding: 2px 8px; border-radius: 100px; }

.sidebar-divider { height: 1px; background: var(--border); margin: 12px 0; }

.sidebar-footer {
  padding: 20px 24px; border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-footer-text { font-size: 12px; color: var(--text3); line-height: 1.6; }

/* ── MAIN LAYOUT ── */
.main-layout {
  padding-top: var(--topbar-h);
  min-height: 100vh;
  display: flex; flex-direction: column;
}
.main-content { flex: 1; }

/* ── PAGE WRAPPER ── */
.page { animation: pageIn 0.4s ease; }
@keyframes pageIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* ── HERO ── */
.hero {
  position: relative; overflow: hidden;
  min-height: calc(100vh - var(--topbar-h));
  display: flex; align-items: center;
  background: radial-gradient(ellipse at 20% 50%, rgba(201,168,76,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.05) 0%, transparent 50%),
              var(--bg);
  padding: 80px 24px;
}
.hero-grid {
  max-width: 1200px; margin: 0 auto; width: 100%;
  display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;
}
.hero-eyebrow {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.3);
  border-radius: 100px; padding: 6px 16px; margin-bottom: 28px;
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold);
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(48px, 5.5vw, 80px); font-weight: 700; line-height: 1.05;
  margin-bottom: 24px; color: var(--white);
}
.hero h1 em { font-style: italic; color: var(--gold-light); }
.hero-sub { font-size: 17px; color: var(--text2); line-height: 1.7; margin-bottom: 44px; max-width: 440px; font-weight: 300; }
.hero-ctas { display: flex; gap: 14px; flex-wrap: wrap; }
.btn-gold {
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
  color: #000; border: none; border-radius: 100px;
  padding: 15px 34px; font-family: 'Outfit', sans-serif;
  font-size: 14px; font-weight: 600; letter-spacing: 0.5px;
  cursor: pointer; transition: all var(--transition);
}
.btn-gold:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(201,168,76,0.35); }
.btn-outline {
  background: transparent; color: var(--text);
  border: 1px solid var(--border2); border-radius: 100px;
  padding: 15px 34px; font-family: 'Outfit', sans-serif;
  font-size: 14px; font-weight: 500; cursor: pointer;
  transition: all var(--transition);
}
.btn-outline:hover { border-color: var(--gold); color: var(--gold); }

.hero-stats {
  display: flex; gap: 32px; margin-top: 52px;
  padding-top: 32px; border-top: 1px solid var(--border);
}
.hero-stat-num {
  font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 700;
  color: var(--gold-light); line-height: 1;
}
.hero-stat-label { font-size: 12px; color: var(--text3); margin-top: 4px; letter-spacing: 0.5px; }

.hero-visual {
  display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
}
.hero-card {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 20px; overflow: hidden; cursor: pointer;
  transition: all var(--transition); aspect-ratio: 3/4;
  display: flex; flex-direction: column;
}
.hero-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); border-color: var(--gold); }
.hero-card:nth-child(2) { margin-top: 28px; }
.hero-card-img {
  flex: 1; display: flex; align-items: center; justify-content: center;
  font-size: 72px; background: var(--surface2);
  position: relative; overflow: hidden;
}
.hero-card-img img {
  width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0;
}
.hero-card-label {
  padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.hero-card-name { font-size: 13px; font-weight: 600; color: var(--text); }
.hero-card-price { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--gold-light); }

/* ── SECTION ── */
.section { padding: 72px 24px; }
.section-inner { max-width: 1200px; margin: 0 auto; }
.section-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  margin-bottom: 40px;
}
.section-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 3vw, 42px); font-weight: 600; color: var(--white);
}
.section-title em { font-style: italic; color: var(--gold-light); }
.section-eyebrow {
  font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--gold); margin-bottom: 10px;
}
.see-all-btn {
  background: none; border: 1px solid var(--border2); border-radius: 100px;
  padding: 8px 20px; color: var(--text2); font-size: 12px;
  font-family: 'Outfit', sans-serif; letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; transition: all var(--transition); white-space: nowrap;
}
.see-all-btn:hover { border-color: var(--gold); color: var(--gold); }

/* ── CATEGORIES STRIP ── */
.categories-strip { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 4px; }
.categories-strip::-webkit-scrollbar { height: 0; }
.cat-pill {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius); padding: 20px 28px; cursor: pointer;
  flex-shrink: 0; transition: all var(--transition);
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  min-width: 130px;
}
.cat-pill:hover, .cat-pill.active {
  background: var(--gold-dim); border-color: var(--gold);
  transform: translateY(-3px); box-shadow: var(--shadow);
}
.cat-pill-icon { font-size: 32px; }
.cat-pill-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; }
.cat-pill-count { font-size: 11px; color: var(--text3); }

/* ── PRODUCTS GRID ── */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 20px;
}

/* ── PRODUCT CARD ── */
.product-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; cursor: pointer;
  transition: all var(--transition); position: relative;
  display: flex; flex-direction: column;
}
.product-card:hover {
  transform: translateY(-6px); border-color: var(--border2);
  box-shadow: var(--shadow-lg);
}
.product-card-img-wrap {
  position: relative; aspect-ratio: 1; overflow: hidden;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 80px;
}
.product-card-img-wrap img {
  width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0;
  transition: transform 0.5s ease;
}
.product-card:hover .product-card-img-wrap img { transform: scale(1.06); }
.product-card-img-wrap .emoji-fallback {
  position: relative; z-index: 0; transition: transform 0.4s ease;
}
.product-card:hover .emoji-fallback { transform: scale(1.08); }

.product-badge {
  position: absolute; top: 12px; left: 12px; z-index: 2;
  font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 4px 10px; border-radius: 6px;
}
.badge-sale { background: #E05252; color: white; }
.badge-new { background: var(--gold); color: #000; }
.badge-hot { background: #E08A52; color: white; }

.fav-btn {
  position: absolute; top: 12px; right: 12px; z-index: 2;
  background: rgba(14,14,14,0.7); backdrop-filter: blur(8px);
  border: 1px solid var(--border2); border-radius: 50%;
  width: 34px; height: 34px; display: flex; align-items: center;
  justify-content: center; cursor: pointer; font-size: 16px;
  transition: all var(--transition); opacity: 0;
}
.product-card:hover .fav-btn { opacity: 1; }
.fav-btn.active { opacity: 1; background: rgba(224,82,82,0.2); border-color: var(--red); }
.fav-btn:hover { background: rgba(224,82,82,0.3); border-color: var(--red); transform: scale(1.1); }

.product-card-body { padding: 18px; flex: 1; display: flex; flex-direction: column; }
.product-brand { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text3); margin-bottom: 6px; }
.product-name { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 10px; line-height: 1.4; }
.product-rating { display: flex; align-items: center; gap: 6px; margin-bottom: 14px; }
.stars { color: var(--gold); font-size: 12px; letter-spacing: 1px; }
.reviews { font-size: 11px; color: var(--text3); }
.product-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: auto; }
.product-price {
  font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; color: var(--white);
}
.product-old-price { font-size: 13px; color: var(--text3); text-decoration: line-through; display: block; font-family: 'Outfit', sans-serif; }
.add-cart-btn {
  background: var(--gold-dim); border: 1px solid rgba(201,168,76,0.3);
  border-radius: 10px; padding: 8px 14px; color: var(--gold);
  font-size: 12px; font-weight: 600; cursor: pointer;
  transition: all var(--transition); white-space: nowrap;
  font-family: 'Outfit', sans-serif;
}
.add-cart-btn:hover { background: var(--gold); color: #000; border-color: var(--gold); }

/* ── PRODUCT DETAIL PAGE ── */
.detail-page { max-width: 1100px; margin: 0 auto; padding: 40px 24px 80px; }
.back-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 100px; padding: 8px 18px; color: var(--text2);
  font-size: 13px; cursor: pointer; margin-bottom: 36px;
  transition: all var(--transition); font-family: 'Outfit', sans-serif;
}
.back-btn:hover { border-color: var(--gold); color: var(--gold); }

.detail-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start;
}
.detail-img-wrap {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 24px; aspect-ratio: 1; overflow: hidden;
  display: flex; align-items: center; justify-content: center; font-size: 140px;
  position: relative;
}
.detail-img-wrap img { width: 100%; height: 100%; object-fit: cover; }
.detail-img-wrap .img-notice {
  position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: rgba(14,14,14,0.85); backdrop-filter: blur(8px);
  border: 1px solid var(--border2); border-radius: 100px;
  padding: 6px 16px; font-size: 11px; color: var(--text3); white-space: nowrap;
}

.detail-info { position: sticky; top: calc(var(--topbar-h) + 24px); }
.detail-cat { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 12px; }
.detail-name {
  font-family: 'Playfair Display', serif; font-size: clamp(28px, 3.5vw, 44px);
  font-weight: 700; color: var(--white); line-height: 1.15; margin-bottom: 16px;
}
.detail-brand { font-size: 14px; color: var(--text3); margin-bottom: 16px; }
.detail-rating { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
.detail-rating .stars { font-size: 16px; }
.detail-rating-text { font-size: 14px; color: var(--text2); }
.detail-price-row { display: flex; align-items: baseline; gap: 16px; margin-bottom: 28px; }
.detail-price {
  font-family: 'Playfair Display', serif; font-size: 44px; font-weight: 700; color: var(--gold-light);
}
.detail-old-price { font-size: 20px; color: var(--text3); text-decoration: line-through; font-family: 'Outfit', sans-serif; }
.detail-desc { font-size: 15px; color: var(--text2); line-height: 1.8; margin-bottom: 36px; font-weight: 300; }

.detail-specs { margin-bottom: 36px; }
.detail-specs-title { font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--text3); margin-bottom: 14px; }
.spec-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.spec-key { color: var(--text3); }
.spec-val { color: var(--text); font-weight: 500; }

.detail-actions { display: flex; gap: 12px; }
.detail-add-btn {
  flex: 1; background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
  color: #000; border: none; border-radius: 100px;
  padding: 18px; font-family: 'Outfit', sans-serif;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: all var(--transition); letter-spacing: 0.5px;
}
.detail-add-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(201,168,76,0.4); }
.detail-fav-btn {
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: 100px; width: 58px; height: 58px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; cursor: pointer; transition: all var(--transition);
}
.detail-fav-btn:hover, .detail-fav-btn.active { background: rgba(224,82,82,0.1); border-color: var(--red); }

/* ── PROMO BANNER ── */
.promo {
  background: linear-gradient(135deg, #1A1500 0%, #0E0E0E 50%, #001A0D 100%);
  border: 1px solid rgba(201,168,76,0.2); border-radius: 24px;
  padding: 60px; position: relative; overflow: hidden;
  display: grid; grid-template-columns: 1fr auto; gap: 40px; align-items: center;
}
.promo::before {
  content: ''; position: absolute; top: -80px; left: -80px;
  width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
}
.promo-tag { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 16px; }
.promo h2 {
  font-family: 'Playfair Display', serif; font-size: 40px; font-weight: 700;
  color: var(--white); line-height: 1.1; margin-bottom: 12px;
}
.promo h2 em { font-style: italic; color: var(--gold-light); }
.promo p { color: var(--text2); font-size: 15px; line-height: 1.6; max-width: 380px; }
.promo-countdown { display: flex; gap: 16px; }
.countdown-unit { text-align: center; background: rgba(255,255,255,0.05); border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 16px 20px; }

/* ══ CONTEXT ══ */
const AppContext = createContext(null);
function useApp() { return useContext(AppContext); }

/* ══ STAR RATING ══ */
function Stars({ rating }) {
  const full = Math.floor(rating);
  const half = rating % 1 >= 0.5 ? 1 : 0;
  return <span className="stars">{"★".repeat(full)}{half?"½":""}</span>;
}

/* ══ TOAST ══ */
function Toasts({ toasts, removeToast }) {
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className="toast">
          <span className="toast-icon">{t.icon}</span>
          <span className="toast-text">{t.msg}</span>
        </div>
      ))}
    </div>
  );
}

/* ══ PRODUCT IMAGE ══ */
function ProductImg({ product, size = "card", className="" }) {
  const [err, setErr] = useState(false);
  if (product.img && !err) {
    return <img src={product.img} alt={product.name} onError={() => setErr(true)} className={className} />;
  }
  return <span className="emoji-fallback">{product.emoji}</span>;
}

/* ══ PRODUCT CARD ══ */
function ProductCard({ product, onOpen }) {
  const { addToCart, toggleFav, favorites } = useApp();
  const isFav = favorites.has(product.id);
  return (
    <div className="product-card" onClick={() => onOpen(product)}>
      <div className="product-card-img-wrap">
        <ProductImg product={product} />
        {product.badge && <span className={`product-badge badge-${product.badge}`}>{product.badge === "new" ? "New" : product.badge === "sale" ? "Sale" : "Hot"}</span>}
        <button className={`fav-btn ${isFav ? "active" : ""}`} onClick={e => { e.stopPropagation(); toggleFav(product); }}>
          {isFav ? "❤️" : "🤍"}
        </button>
      </div>
      <div className="product-card-body">
        <div className="product-brand">{product.brand}</div>
        <div className="product-name">{product.name}</div>
        <div className="product-rating">
          <Stars rating={product.rating} />
          <span className="reviews">({product.reviews.toLocaleString()})</span>
        </div>
        <div className="product-card-footer">
          <div>
            {product.oldPrice && <span className="product-old-price">${product.oldPrice}</span>}
            <span className="product-price">${product.price}</span>
          </div>
          <button className="add-cart-btn" onClick={e => { e.stopPropagation(); addToCart(product); }}>Add +</button>
        </div>
      </div>
    </div>
  );
}

/* ══ PROMO BANNER ══ */
function PromoBanner({ onShop }) {
  const [time, setTime] = useState({ h: 11, m: 47, s: 23 });
  useEffect(() => {
    const t = setInterval(() => {
      setTime(prev => {
        let { h, m, s } = prev;
        s--; if (s < 0) { s = 59; m--; } if (m < 0) { m = 59; h--; } if (h < 0) { h = 23; }
        return { h, m, s };
      });
    }, 1000);
    return () => clearInterval(t);
  }, []);
  const pad = n => String(n).padStart(2, "0");
  return (
    <div className="promo" style={{ margin: "0 0 0 0" }}>
      <div>
        <div className="promo-tag">✦ Limited Time Offer</div>
        <h2>Up to <em>50% Off</em><br />Tech Essentials</h2>
        <p style={{ marginTop: 12, marginBottom: 28 }}>Premium gadgets at unbeatable prices — only while stocks last.</p>
        <button className="btn-gold" onClick={() => onShop("tech")}>Shop Tech Sale</button>
      </div>
      <div className="promo-countdown">
        {[["Hours", pad(time.h)], ["Mins", pad(time.m)], ["Secs", pad(time.s)]].map(([l, n]) => (
          <div className="countdown-unit" key={l}>
            <span className="countdown-num">{n}</span>
            <span className="countdown-label">{l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

    ? PRODUCTS.filter(p =>
        p.name.toLowerCase().includes(query.toLowerCase()) ||
        p.brand.toLowerCase().includes(query.toLowerCase()) ||
        p.cat.toLowerCase().includes(query.toLowerCase()) ||
        (p.desc && p.desc.toLowerCase().includes(query.toLowerCase()))
      )
    : PRODUCTS;
  const cats = [...new Set(allResults.map(p => p.cat))];
  const shown = filter === "all" ? allResults : allResults.filter(p => p.cat === filter);

  return (
    <div className="page">
      <div className="search-header">
        <h2>{query.trim() ? `"${query}"` : "All Products"}</h2>
        <p>{allResults.length} result{allResults.length !== 1 ? "s" : ""} found</p>
        <div className="search-filter-row">
          <button className={`filter-chip ${filter === "all" ? "active" : ""}`} onClick={() => setFilter("all")}>All ({allResults.length})</button>
          {cats.map(c => {
            const cat = CATEGORIES.find(x => x.id === c);
            return (
              <button key={c} className={`filter-chip ${filter === c ? "active" : ""}`} onClick={() => setFilter(c)}>
                {cat?.icon} {cat?.label?.split(" ")[0] || c} ({allResults.filter(p => p.cat === c).length})
              </button>
            );
          })}
        </div>
      </div>
      <section className="section">
        <div className="section-inner">
          <div className="products-grid">
            {shown.map(p => <ProductCard key={p.id} product={p} onOpen={onOpen} />)}
          </div>
          {shown.length === 0 && (
            <div style={{ textAlign: "center", padding: "80px", color: "var(--text3)" }}>
              <div style={{ fontSize: 64, marginBottom: 16 }}>😔</div>
              <div style={{ fontSize: 20, marginBottom: 8 }}>No results found</div>
              <div style={{ fontSize: 14 }}>Try a different search term</div>
            </div>
          )}
        </div>
      </section>
    </div>
  );
}

/* ══ FOOTER ══ */
function Footer({ onCatSelect }) {
  return (
    <footer>
      <div className="footer-inner">
        <div className="footer-top">
          <div>
            <div className="footer-brand-logo">LUXE</div>
            <div className="footer-brand-desc">Your one-stop premium shopping destination. Curated quality across every category, delivered with care and elegance.</div>
            <div style={{ display: "flex", gap: 10 }}>
              {["𝕏", "📘", "📸", "▶️"].map(s => (
                <div key={s} style={{ background: "var(--surface2)", border: "1px solid var(--border2)", borderRadius: 10, width: 38, height: 38, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", fontSize: 16 }}>{s}</div>
              ))}
            </div>
          </div>
          <div className="footer-col">
            <div className="footer-col-title">Shop</div>
            <ul>
              {CATEGORIES.filter(c => c.id !== "all").map(c => (
                <li key={c.id}><a onClick={() => onCatSelect(c.id)}>{c.label}</a></li>
              ))}
            </ul>
          </div>
          <div className="footer-col">
            <div className="footer-col-title">Account</div>
            <ul>{["Sign In", "Register", "Wishlist", "Orders", "Settings"].map(i => <li key={i}><a href="#">{i}</a></li>)}</ul>
          </div>
          <div className="footer-col">
            <div className="footer-col-title">Support</div>
            <ul>{["Help Center", "Returns", "Shipping", "Contact Us", "Privacy Policy"].map(i => <li key={i}><a href="#">{i}</a></li>)}</ul>
          </div>
        </div>
        <div className="footer-bottom">
          <span className="footer-bottom-text">© 2026 LUXE Shopping. All rights reserved.</span>
          <span className="footer-bottom-text">🔒 Secure · Free Returns · 24/7 Support</span>
        </div>
      </div>
    </footer>
  );
}

/* ══════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════ */
function App() {
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [cartOpen, setCartOpen] = useState(false);
  const [page, setPage] = useState({ type: "home" });
  const [searchQuery, setSearchQuery] = useState("");
  const [cart, setCart] = useState([]);
  const [favorites, setFavorites] = useState(new Set());
  const [toasts, setToasts] = useState([]);
  const [scrolled, setScrolled] = useState(false);

  useEffect(() => {
    const handler = () => setScrolled(window.scrollY > 20);
    window.addEventListener("scroll", handler);
    return () => window.removeEventListener("scroll", handler);
  }, []);

  const showToast = useCallback((msg, icon = "✓") => {
    const id = Date.now();
    setToasts(prev => [...prev, { id, msg, icon }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3000);
  }, []);

  const addToCart = useCallback((product) => {
    setCart(prev => {
      const existing = prev.find(i => i.id === product.id);
      if (existing) return prev.map(i => i.id === product.id ? { ...i, qty: i.qty + 1 } : i);
      return [...prev, { ...product, qty: 1 }];
    });
    showToast(`${product.name} added to cart!`, "🛍️");
  }, [showToast]);

  const removeFromCart = useCallback((id) => {
    setCart(prev => prev.filter(i => i.id !== id));
  }, []);

  const changeQty = useCallback((id, delta) => {
    setCart(prev => {
      return prev.map(i => i.id === id ? { ...i, qty: i.qty + delta } : i)
                 .filter(i => i.qty > 0);
    });
  }, []);

  const toggleFav = useCallback((product) => {
    setFavorites(prev => {
      const n = new Set(prev);
      if (n.has(product.id)) { n.delete(product.id); showToast("Removed from wishlist", "🤍"); }
      else { n.add(product.id); showToast("Added to wishlist!", "❤️"); }
      return n;
    });
  }, [showToast]);

  const openProduct = useCallback((product) => {
    setPage({ type: "product", product });
    window.scrollTo(0, 0);
  }, []);

  const selectCat = useCallback((catId) => {
    setPage({ type: catId === "all" ? "cat" : "cat", catId });
    setSearchQuery("");
    window.scrollTo(0, 0);
  }, []);

  const doSearch = useCallback((q) => {
    if (!q.trim()) return;
    setPage({ type: "search", query: q });
    window.scrollTo(0, 0);
  }, []);

  const goHome = useCallback(() => {
    setPage({ type: "home" });
    setSearchQuery("");
    window.scrollTo(0, 0);
  }, []);

  const totalQty = cart.reduce((s, i) => s + i.qty, 0);

  return (
    <AppContext.Provider value={{ cart, addToCart, removeFromCart, changeQty, favorites, toggleFav }}>
      {/* TOPBAR */}
      <nav className={`topbar ${scrolled ? "scrolled" : ""}`}>
        <button className={`hamburger-btn ${sidebarOpen ? "open" : ""}`} onClick={() => setSidebarOpen(!sidebarOpen)} aria-label="Menu">
          <div className="ham-line" /><div className="ham-line" /><div className="ham-line" />
        </button>

        <span className="logo" onClick={goHome}>LUXE</span>

        <div className="search-wrap">
          <input
            className="search-input"
            type="text"
            placeholder="Search products, brands, categories..."
            value={searchQuery}
            onChange={e => setSearchQuery(e.target.value)}
            onKeyDown={e => e.key === "Enter" && doSearch(searchQuery)}
          />
          <button className="search-icon-btn" onClick={() => doSearch(searchQuery)}>🔍</button>
        </div>

        <div className="topbar-right">
          <div className="icon-btn" onClick={() => setPage({ type: "cat", catId: "all" })} title="All Products">✦</div>
          <div className="icon-btn" style={{ position: "relative" }} onClick={() => setCartOpen(true)} title="Cart">
            🛍️
            {totalQty > 0 && <span className="badge">{totalQty}</span>}
          </div>
        </div>
      </nav>

      {/* SIDEBAR */}
      <Sidebar
        isOpen={sidebarOpen}
        onClose={() => setSidebarOpen(false)}
        currentCat={page.catId}
        onCatSelect={selectCat}
      />

      {/* CART */}
      <CartDrawer isOpen={cartOpen} onClose={() => setCartOpen(false)} />

      {/* MAIN */}
      <div className="main-layout">
        <main className="main-content">
          {page.type === "home" && <HomePage onOpen={openProduct} onCatSelect={selectCat} />}
          {page.type === "cat" && <CategoryPage catId={page.catId || "all"} onOpen={openProduct} />}
          {page.type === "search" && <SearchPage query={page.query || ""} onOpen={openProduct} />}
          {page.type === "product" && <ProductDetail product={page.product} onBack={() => window.history.length > 1 ? setPage(prev => prev) || setPage({ type: "home" }) : setPage({ type: "home" })} />}
        </main>
        <Footer onCatSelect={selectCat} />
      </div>

      {/* TOASTS */}
      <Toasts toasts={toasts} />
    </AppContext.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
